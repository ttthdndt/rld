<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StockX Release Date Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1f1f1f;
    --accent: #e8ff47;
    --accent2: #ff5c3a;
    --text: #f0f0f0;
    --muted: #555;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  /* — grain overlay — */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
  }

  /* — header — */
  header {
    margin-bottom: 48px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  h1 {
    font-family: var(--display);
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* — input panel — */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    padding: 20px;
    resize: vertical;
    min-height: 160px;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); }

  /* — API URL input — */
  .api-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: stretch;
  }

  .api-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    white-space: nowrap;
    padding: 0 4px;
  }

  .api-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--muted); }

  /* — button — */
  .btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 4px;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 14px 28px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    width: 100%;
    justify-content: center;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,255,71,0.25); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-icon { font-size: 16px; }

  /* — progress bar — */
  .progress-wrap {
    display: none;
    margin-top: 24px;
    margin-bottom: 4px;
  }

  .progress-wrap.visible { display: block; }

  .progress-bar-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px var(--accent);
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* — table — */
  .table-wrap {
    display: none;
    margin-top: 40px;
    animation: fadeUp 0.4s ease;
  }

  .table-wrap.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .table-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .table-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
  }

  .badge {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    background: rgba(232,255,71,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    border-bottom: 2px solid var(--accent);
  }

  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px 16px;
    text-align: left;
  }

  td {
    padding: 13px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tbody tr {
    transition: background 0.15s;
  }

  tbody tr:hover {
    background: rgba(255,255,255,0.03);
  }

  .sku-cell {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text);
  }

  .date-cell {
    color: var(--accent);
    font-weight: 500;
  }

  .date-cell.error {
    color: var(--accent2);
    font-size: 11px;
    letter-spacing: 0.04em;
  }

  /* spinner */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* — export — */
  .export-row {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-sm:hover { border-color: var(--text); color: var(--text); }

  /* divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 40px 0;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="eyebrow">↗ StockX Tool</div>
    <h1>Release<br/><span>Date Lookup</span></h1>
    <p class="subtitle">Paste SKU slugs one per line — the tool will query your API<br/>and return a clean release date table.</p>
  </header>

  <!-- API base URL -->
  <div class="api-row">
    <span class="api-label">API&nbsp;URL</span>
    <input class="api-input" id="apiUrl"
           type="text"
           placeholder="https://your-app.vercel.app"
           value="https://your-app.vercel.app"/>
  </div>

  <!-- SKU textarea -->
  <div class="panel">
    <div class="panel-header">
      <div class="dot"></div>
      SKU list — one per line
    </div>
    <textarea id="skuInput" placeholder="nike-air-max-1-anniversary-red&#10;adidas-yeezy-boost-350-v2-zebra&#10;jordan-1-retro-high-og-chicago-2015"></textarea>
  </div>

  <button class="btn" id="fetchBtn" onclick="fetchAll()">
    <span class="btn-icon">⚡</span> Fetch Release Dates
  </button>

  <!-- progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">Initializing…</div>
  </div>

  <!-- table -->
  <div class="table-wrap" id="tableWrap">
    <div class="table-meta">
      <span class="table-title">Results</span>
      <span class="badge" id="countBadge">0 items</span>
    </div>
    <table id="resultsTable">
      <thead>
        <tr>
          <th>SKU</th>
          <th>Release Date</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>

    <div class="export-row">
      <button class="btn-sm" onclick="exportCSV()">Export CSV</button>
      <button class="btn-sm" onclick="copyTable()">Copy Table</button>
    </div>
  </div>

</div>

<script>
  const results = [];

  async function fetchAll() {
    const raw = document.getElementById('skuInput').value.trim();
    const apiBase = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
    const skus = raw.split('\n').map(s => s.trim()).filter(Boolean);

    if (!skus.length) { alert('Please enter at least one SKU.'); return; }
    if (!apiBase) { alert('Please enter your API base URL.'); return; }

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Fetching…';

    results.length = 0;

    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    document.getElementById('tableWrap').classList.remove('visible');

    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    progressWrap.classList.add('visible');

    // Show table immediately for live updates
    document.getElementById('tableWrap').classList.add('visible');
    document.getElementById('countBadge').textContent = `0 / ${skus.length}`;

    for (let i = 0; i < skus.length; i++) {
      const sku = skus[i];
      const pct = Math.round(((i) / skus.length) * 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = `Processing ${i + 1} of ${skus.length} — ${sku}`;

      // Placeholder row
      const tr = document.createElement('tr');
      tr.id = `row-${i}`;
      tr.innerHTML = `
        <td class="sku-cell">${escHtml(sku)}</td>
        <td class="date-cell"><span class="spinner"></span></td>
      `;
      tbody.appendChild(tr);

      let date = null, err = null;
      try {
        const res = await fetch(`${apiBase}/release-date?sku=${encodeURIComponent(sku)}`);
        if (res.ok) {
          const data = await res.json();
          date = data.release_date || null;
        } else {
          const data = await res.json().catch(() => ({}));
          err = data.detail || `HTTP ${res.status}`;
        }
      } catch (e) {
        err = 'Network error';
      }

      results.push({ sku, date, err });

      // Update row
      const row = document.getElementById(`row-${i}`);
      if (row) {
        row.querySelector('td:last-child').outerHTML =
          date
            ? `<td class="date-cell">${escHtml(date)}</td>`
            : `<td class="date-cell error">${escHtml(err || 'Not found')}</td>`;
      }

      document.getElementById('countBadge').textContent = `${i + 1} / ${skus.length}`;
    }

    progressFill.style.width = '100%';
    progressText.textContent = `Done — ${skus.length} SKUs processed`;

    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Fetch Release Dates';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function exportCSV() {
    if (!results.length) return;
    const rows = [['SKU', 'Release Date']];
    results.forEach(r => rows.push([r.sku, r.date || r.err || '']));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'stockx-release-dates.csv';
    a.click();
  }

  function copyTable() {
    if (!results.length) return;
    const lines = ['SKU\tRelease Date', ...results.map(r => `${r.sku}\t${r.date || r.err || ''}`)];
    navigator.clipboard.writeText(lines.join('\n'))
      .then(() => { showToast('Copied to clipboard!'); })
      .catch(() => alert('Copy failed.'));
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    Object.assign(t.style, {
      position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
      background: '#e8ff47', color: '#0a0a0a', fontFamily: "'DM Mono', monospace",
      fontSize: '12px', padding: '10px 20px', borderRadius: '4px',
      fontWeight: '500', zIndex: '999', letterSpacing: '0.06em',
      animation: 'fadeUp 0.3s ease'
    });
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }
</script>
</body>
</html>
