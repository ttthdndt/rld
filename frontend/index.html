<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKU Lookup — StockX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222;
      --accent: #c8f135;
      --accent2: #ff4d4d;
      --text: #f0f0f0;
      --muted: #666;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Bebas Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--display);
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .header-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 4px 10px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 32px;
    }

    .hero {
      margin-bottom: 48px;
    }

    .hero h1 {
      font-family: var(--display);
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.9;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
      -webkit-text-stroke: 0px;
    }

    .hero p {
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      max-width: 440px;
      line-height: 1.7;
    }

    .input-section {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 48px;
    }

    .textarea-wrap {
      position: relative;
    }

    .textarea-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 16px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.8;
    }

    textarea:focus { border-color: var(--accent); }

    textarea::placeholder { color: var(--muted); }

    .btn {
      font-family: var(--display);
      font-size: 1.4rem;
      letter-spacing: 3px;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.15s;
      align-self: end;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { background: #d9ff4a; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .btn.loading .spinner { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats bar */
    .stats-bar {
      display: none;
      gap: 32px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .stats-bar.visible { display: flex; }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-num {
      font-family: var(--display);
      font-size: 2rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.4s ease;
    }

    .table-wrap.visible {
      opacity: 1;
      transform: translateY(0);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      border-bottom: 2px solid var(--accent);
    }

    th {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 12px 16px;
      text-align: left;
      font-weight: 500;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: rowIn 0.3s ease both;
    }

    tbody tr:hover { background: rgba(255,255,255,0.03); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    td {
      padding: 14px 16px;
      vertical-align: middle;
    }

    .td-image img {
      width: 56px;
      height: 40px;
      object-fit: contain;
      background: #fff;
      padding: 2px;
    }

    .td-name {
      font-weight: 500;
      max-width: 280px;
    }

    .td-name small {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .td-sku {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }

    .td-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .td-price {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
    }

    .badge-error {
      font-family: var(--mono);
      font-size: 10px;
      background: rgba(255,77,77,0.15);
      color: var(--accent2);
      border: 1px solid var(--accent2);
      padding: 3px 8px;
      letter-spacing: 1px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }

    .empty-state .big {
      font-family: var(--display);
      font-size: 5rem;
      color: var(--border);
      display: block;
      margin-bottom: 16px;
    }

    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      main { padding: 40px 20px; }
      .input-section { grid-template-columns: 1fr; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">SKU<span>SCAN</span></div>
  <div class="header-tag">StockX Lookup</div>
</header>

<main>
  <div class="hero">
    <h1>LOOK UP<br><em>ANY SKU</em><br>INSTANTLY</h1>
    <p>Paste your SKU list below — one per line — and get name, release date, pricing and more from StockX in seconds.</p>
  </div>

  <div class="input-section">
    <div class="textarea-wrap">
      <span class="textarea-label">// Enter SKUs — one per line</span>
      <textarea id="skuInput" placeholder="DV1031-030&#10;FD2596-100&#10;DZ5485-612"></textarea>
    </div>
    <button class="btn" id="lookupBtn" onclick="lookupSKUs()">
      <span class="spinner"></span>
      LOOK UP
    </button>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Total SKUs</span></div>
    <div class="stat"><span class="stat-num" id="statSuccess">0</span><span class="stat-label">Found</span></div>
    <div class="stat"><span class="stat-num" id="statError">0</span><span class="stat-label">Errors</span></div>
  </div>

  <div class="table-wrap" id="tableWrap">
    <div class="empty-state" id="emptyState">
      <span class="big">—</span>
      Results will appear here
    </div>
    <table id="resultsTable" style="display:none">
      <thead>
        <tr>
          <th></th>
          <th>Name</th>
          <th>SKU</th>
          <th>Release Date</th>
          <th>Retail</th>
          <th>Last Sale</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</main>

<script>
  // Change this to your deployed FastAPI URL
  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000'
    : 'https://YOUR-BACKEND.vercel.app'; // ← update after deploying

  async function lookupSKUs() {
    const input = document.getElementById('skuInput').value.trim();
    if (!input) return;

    const skus = input.split('\n').map(s => s.trim()).filter(Boolean);
    if (!skus.length) return;

    const btn = document.getElementById('lookupBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner"></span> LOADING...';

    try {
      const res = await fetch(`${API_BASE}/lookup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skus }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { results } = await res.json();
      renderResults(results);
    } catch (err) {
      alert('Error connecting to backend: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.innerHTML = '<span class="spinner"></span> LOOK UP';
    }
  }

  function renderResults(results) {
    const successCount = results.filter(r => r.status === 'success').length;
    const errorCount = results.filter(r => r.status === 'error').length;

    document.getElementById('statTotal').textContent = results.length;
    document.getElementById('statSuccess').textContent = successCount;
    document.getElementById('statError').textContent = errorCount;
    document.getElementById('statsBar').classList.add('visible');

    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';

    results.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.style.animationDelay = `${i * 50}ms`;

      if (r.status === 'error') {
        tr.innerHTML = `
          <td class="td-image">—</td>
          <td class="td-name"><span class="badge-error">NOT FOUND</span></td>
          <td class="td-sku">${r.sku}</td>
          <td>—</td><td>—</td><td>—</td>`;
      } else {
        const img = r.image ? `<img src="${r.image}" alt="${r.name}" />` : '—';
        const retail = r.retail_price ? `$${r.retail_price}` : '—';
        const lastSale = r.last_sale ? `$${r.last_sale}` : '—';
        tr.innerHTML = `
          <td class="td-image">${img}</td>
          <td class="td-name">${r.name}<small>${r.brand} · ${r.colorway}</small></td>
          <td class="td-sku">${r.sku}</td>
          <td class="td-date">${r.release_date}</td>
          <td class="td-price">${retail}</td>
          <td class="td-price">${lastSale}</td>`;
      }
      tbody.appendChild(tr);
    });

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsTable').style.display = 'table';
    document.getElementById('tableWrap').classList.add('visible');
  }

  // Allow Enter key in textarea to not submit, keep multiline
  document.getElementById('skuInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) lookupSKUs();
  });
</script>

</body>
</html>
